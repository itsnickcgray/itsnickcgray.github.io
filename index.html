<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>itsnickcgray</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #2b2b2b, #050505 55%);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 25px;
    }

    .card {
      width: 100%;
      max-width: 430px;
      background: rgba(15, 15, 15, 0.88);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 24px;
      padding: 28px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.65);
    }

    .pfp {
      width: 105px;
      height: 105px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(255, 255, 255, 0.25);
      background: #222;
      margin-bottom: 15px;
    }

    h1 {
      margin: 8px 0 4px;
      font-size: 32px;
      letter-spacing: -1px;
    }

    .tag {
      color: #b8b8b8;
      font-size: 15px;
      margin-bottom: 18px;
    }

    .status {
      display: inline-block;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      color: #dcdcdc;
      font-size: 13px;
      margin-bottom: 20px;
    }

    .bio {
      color: #dddddd;
      font-size: 15px;
      line-height: 1.5;
      margin-bottom: 22px;
    }

    .links a {
      display: block;
      color: white;
      text-decoration: none;
      background: rgba(255, 255, 255, 0.09);
      border: 1px solid rgba(255, 255, 255, 0.12);
      padding: 14px;
      border-radius: 14px;
      margin: 10px 0;
      transition: 0.2s;
    }

    .links a:hover {
      background: rgba(255, 255, 255, 0.18);
      transform: translateY(-2px);
    }

    .footer {
      margin-top: 22px;
      font-size: 12px;
      color: #888;
    }
  </style>
</head>

<body>
  <div class="card">
    <img class="pfp" src="https://via.placeholder.com/150" alt="profile picture">

    <h1>nick gray</h1>
    <div class="tag">@itsnickcgray</div>

    <div class="status">currently: probably listening to music</div>

    <p class="bio">
      music, art, tech, random projects, and whatever else ends up here.
      this is my external bio page.
    </p>

    <div class="links">
      <a href="https://open.spotify.com/user/31q6rpsnu2qx6yanzpqq4ww66qey?si=dc41fab4042048b3" target="_blank">Spotify</a>
      <a href="https://youtube.com/@npcnick" target="_blank">YouTube</a>
      <a href="https://discord.com/users/1437574047742427176" target="_blank">Discord</a>
      <a href="https://github.com/itsnickcgray" target="_blank">GitHub</a>
    </div>

    <div class="footer">
      © 2026 nick gray
    </div>
  </div>
</body>
</html>
